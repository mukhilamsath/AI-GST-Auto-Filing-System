<div class="invoices-container">
  <h1 class="page-title">Recent Invoices</h1>

  <mat-card class="table-card">
    <mat-card-content>
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search Invoices</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ex. INV-1001" #input>
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <div class="table-responsive">
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z0">
          
          <ng-container matColumnDef="invoiceNumber">
            <th mat-header-cell *matHeaderCellDef> Invoice # </th>
            <td mat-cell *matCellDef="let invoice"> {{invoice.invoiceNumber}} </td>
          </ng-container>

          <ng-container matColumnDef="vendorName">
            <th mat-header-cell *matHeaderCellDef> Vendor Name </th>
            <td mat-cell *matCellDef="let invoice"> {{invoice.vendorName}} </td>
          </ng-container>

          <ng-container matColumnDef="invoiceDate">
            <th mat-header-cell *matHeaderCellDef> Date </th>
            <td mat-cell *matCellDef="let invoice"> {{invoice.invoiceDate | date}} </td>
          </ng-container>

          <ng-container matColumnDef="totalAmount">
            <th mat-header-cell *matHeaderCellDef> Total Amount </th>
            <td mat-cell *matCellDef="let invoice"> ₹{{invoice.totalAmount | number:'1.2-2'}} </td>
          </ng-container>

          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef> Status </th>
            <td mat-cell *matCellDef="let invoice">
              <span class="status-chip" [ngClass]="getStatusClass(invoice.validationStatus)">
                {{invoice.validationStatus}}
              </span>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell empty-cell" colspan="5">No data matching the filter "{{input.value}}"</td>
          </tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</div>
