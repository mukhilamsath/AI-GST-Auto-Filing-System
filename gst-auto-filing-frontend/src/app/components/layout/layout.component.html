<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav mode="side" opened class="sidenav">
    <div class="logo-container">
      <h2>GST Auto-Filing</h2>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/analytics" routerLinkActive="active-link">
        <mat-icon matListItemIcon>bar_chart</mat-icon>
        <span matListItemTitle>Analytics</span>
      </a>
      <a mat-list-item routerLink="/upload" routerLinkActive="active-link">
        <mat-icon matListItemIcon>upload_file</mat-icon>
        <span matListItemTitle>Upload Invoice</span>
      </a>
      <a mat-list-item routerLink="/invoices" routerLinkActive="active-link">
        <mat-icon matListItemIcon>receipt</mat-icon>
        <span matListItemTitle>Invoices</span>
      </a>
      <a mat-list-item routerLink="/errors" routerLinkActive="active-link">
        <mat-icon matListItemIcon>error_outline</mat-icon>
        <span matListItemTitle>Validation Errors</span>
      </a>
      <a *ngIf="isReviewer" mat-list-item routerLink="/review-queue" routerLinkActive="active-link">
        <mat-icon matListItemIcon>rule</mat-icon>
        <span matListItemTitle>Review Queue</span>
      </a>
      <a *ngIf="isAdmin" mat-list-item routerLink="/users" routerLinkActive="active-link">
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>User Management</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary" class="top-toolbar">
      <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="spacer"></span>
      <span class="user-name" *ngIf="userName">{{ userName }}</span>
      <button mat-icon-button [matMenuTriggerFor]="menu">
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #menu="matMenu">
        <button mat-menu-item (click)="logout()">
          <mat-icon>exit_to_app</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </mat-toolbar>
    <div class="main-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
