<div class="analytics-container">
  <div class="header-section">
    <h2>Financial & Compliance Analytics</h2>
    <p>Visual summary of tax liabilities and invoice validation checks.</p>
  </div>

  <div *ngIf="isLoading" class="loading-state">
    <mat-card class="loader-card">
      <mat-card-content>
        <div class="spinner-container">
          <div class="shimmer-block title-shimmer"></div>
          <div class="shimmer-block chart-shimmer"></div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <div *ngIf="!isLoading" class="analytics-grid">
    <!-- Monthly Tax Liabilities (Stacked Bar Chart) -->
    <mat-card class="analytics-card chart-card-large">
      <mat-card-header>
        <mat-card-title>
          <mat-icon class="title-icon">bar_chart</mat-icon>
          Monthly Tax Liability Breakdown
        </mat-card-title>
        <mat-card-subtitle>CGST, SGST, and IGST stacked liabilities by month</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-wrapper">
          <canvas baseChart 
                  [data]="barChartData" 
                  [options]="barChartOptions" 
                  [type]="'bar'">
          </canvas>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Error Type Distribution (Doughnut Chart) -->
    <mat-card class="analytics-card chart-card-small">
      <mat-card-header>
        <mat-card-title>
          <mat-icon class="title-icon">pie_chart</mat-icon>
          Compliance Issues Distribution
        </mat-card-title>
        <mat-card-subtitle>Breakdown of verification failure categories</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-wrapper">
          <canvas baseChart 
                  [data]="doughnutChartData" 
                  [options]="doughnutChartOptions" 
                  [type]="'doughnut'">
          </canvas>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
