<div class="errors-container">
  <h1 class="page-title">Validation Errors</h1>

  <mat-card class="table-card">
    <mat-card-content>
      <div class="table-responsive">
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z0">
          
          <ng-container matColumnDef="invoiceNumber">
            <th mat-header-cell *matHeaderCellDef> Invoice # </th>
            <td mat-cell *matCellDef="let error"> {{error.invoiceNumber}} </td>
          </ng-container>

          <ng-container matColumnDef="errorMessage">
            <th mat-header-cell *matHeaderCellDef> Error Message </th>
            <td mat-cell *matCellDef="let error"> {{error.errorMessage}} </td>
          </ng-container>

          <ng-container matColumnDef="severity">
            <th mat-header-cell *matHeaderCellDef> Severity </th>
            <td mat-cell *matCellDef="let error">
              <span class="severity-chip" [ngClass]="getSeverityClass(error.severity)">
                {{error.severity}}
              </span>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell empty-cell" colspan="3">No validation errors found.</td>
          </tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</div>
