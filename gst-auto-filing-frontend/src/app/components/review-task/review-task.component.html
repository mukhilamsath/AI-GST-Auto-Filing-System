<div class="glass-panel p-6 max-w-3xl mx-auto">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-white">Review Task: {{ invoice?.invoiceNumber }}</h2>
    <span class="px-3 py-1 rounded-full text-sm"
          [ngClass]="{'bg-red-500/20 text-red-400': invoice?.confidenceScore < 50, 'bg-yellow-500/20 text-yellow-400': invoice?.confidenceScore >= 50}">
      Confidence: {{ invoice?.confidenceScore }}%
    </span>
  </div>

  <div *ngIf="loading" class="text-white text-center py-8">Loading...</div>

  <div *ngIf="!loading && invoice">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
      <!-- Original Extracted Data (Readonly) -->
      <div class="p-4 bg-black/20 rounded-xl border border-gray-700/50">
        <h3 class="text-lg font-semibold text-gray-300 mb-4">Original Extracted Data</h3>
        
        <div class="space-y-4 text-sm">
          <div>
            <label class="block text-gray-500">Invoice Number</label>
            <div class="text-white">{{ invoice.invoiceNumber }}</div>
          </div>
          <div>
            <label class="block text-gray-500">Vendor Name</label>
            <div class="text-white">{{ invoice.vendorName }}</div>
          </div>
          <div>
            <label class="block text-gray-500">GSTIN</label>
            <div class="text-white">{{ invoice.gstin }}</div>
          </div>
          <div>
            <label class="block text-gray-500">Taxable Amount</label>
            <div class="text-white">₹{{ invoice.taxableAmount }}</div>
          </div>
          <div>
            <label class="block text-gray-500">Total Amount</label>
            <div class="text-white">₹{{ invoice.totalAmount }}</div>
          </div>
        </div>
      </div>

      <!-- Correction Form -->
      <div class="p-4 bg-black/20 rounded-xl border border-primary/30">
        <h3 class="text-lg font-semibold text-primary mb-4">Corrected Data</h3>
        
        <div class="space-y-4">
          <div>
            <label class="block text-gray-400 text-sm mb-1">Invoice Number</label>
            <input type="text" [(ngModel)]="correctedFields['invoiceNumber']" class="form-input text-sm">
          </div>
          <div>
            <label class="block text-gray-400 text-sm mb-1">Vendor Name</label>
            <input type="text" [(ngModel)]="correctedFields['vendorName']" class="form-input text-sm">
          </div>
          <div>
            <label class="block text-gray-400 text-sm mb-1">GSTIN</label>
            <input type="text" [(ngModel)]="correctedFields['gstin']" class="form-input text-sm">
          </div>
          <div>
            <label class="block text-gray-400 text-sm mb-1">Taxable Amount</label>
            <input type="number" [(ngModel)]="correctedFields['taxableAmount']" class="form-input text-sm">
          </div>
          <div>
            <label class="block text-gray-400 text-sm mb-1">Total Amount</label>
            <input type="number" [(ngModel)]="correctedFields['totalAmount']" class="form-input text-sm">
          </div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-4 mt-8 pt-6 border-t border-gray-700">
      <button (click)="cancel()" class="px-6 py-2 rounded-xl text-gray-300 hover:bg-white/10 transition-colors">
        Cancel
      </button>
      <button (click)="submitReview()" [disabled]="submitting" class="btn-primary">
        {{ submitting ? 'Submitting...' : 'Submit Corrections' }}
      </button>
    </div>
  </div>
</div>
